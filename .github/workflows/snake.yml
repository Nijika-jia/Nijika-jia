name: generate animation

on:
  # 每24小时自动运行（等价于 0 0 * * *，写法更规范）
  schedule:
    - cron: "0 0 * * *"
  # 手动触发开关
  workflow_dispatch:
  # 兼容 main/master 分支的 push 触发（覆盖绝大多数仓库）
  push:
    branches:
      - master
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 添加权限声明（新版 GitHub Action 必需，避免权限不足）
    permissions:
      contents: write  # 允许写入分支（推送到 output 分支）
      pages: write     # 可选，增强兼容性

    steps:
      # 先检出代码（新版 Action 必需步骤，否则 dist 目录可能创建失败）
      - name: Checkout repository
        uses: actions/checkout@v4

      # 生成贪吃蛇 SVG（包含亮色/暗色两个版本）
      - name: Generate snake animation SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.SNAKE_TOKEN }}

      # 推送 SVG 到 output 分支（升级到稳定新版）
      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          # 强制推送（避免分支冲突，可选但推荐）
          force_orphan: true
        env:
          GITHUB_TOKEN: ${{ secrets.SNAKE_TOKEN }}
